<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · Kene Ezeoke</title>
<meta name="description" content="Notes on building systems, decision quality, and operating in ambiguity.">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Sora:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f6f1eb; --bg-card: #faf8f4; --text: #1c1814; --text-mid: #4a4238; --text-sec: #6b6058; --text-muted: #8a7e6a; --accent: #b5502a; --accent-hover: #8b3a18; --border: #ddd5c5; --border-light: #ece6dd; }
html { scroll-behavior: smooth; }
body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 15px; -webkit-font-smoothing: antialiased; }
.nav { position: sticky; top: 0; z-index: 100; background: rgba(246,241,235,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid transparent; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; transition: border-color 0.3s; }
.nav.scrolled { border-bottom-color: var(--border); }
.nav-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; color: var(--text); text-decoration: none; }
.nav-links { display: flex; gap: 1.5rem; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 500; color: var(--text-muted); text-decoration: none; transition: color 0.2s; position: relative; }
.nav-links a::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }
.nav-links a:hover { color: var(--text); } .nav-links a:hover::after { width: 100%; }
.nav-links a.active { color: var(--accent); } .nav-links a.active::after { width: 100%; }
.page-header { padding: 4rem 2rem 0.5rem; max-width: 680px; margin: 0 auto; }
.page-title { font-family: 'Fraunces', serif; font-size: clamp(2rem, 4vw, 2.5rem); color: var(--text); line-height: 1.2; }
.page-desc { font-size: 13px; color: var(--text-muted); margin-top: 0.5rem; }
.blog-feed { max-width: 680px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
.post-entry { padding: 1.2rem 0; border-bottom: 1px solid var(--border-light); }
.post-entry-date { font-size: 11px; color: var(--text-muted); margin-bottom: 0.4rem; }
.post-entry-title { font-family: 'Fraunces', serif; font-size: 18px; color: var(--text); line-height: 1.35; margin-bottom: 0.5rem; }
.post-entry-title a { color: inherit; text-decoration: none; transition: color 0.2s; }
.post-entry-title a:hover { color: var(--accent); }
.post-entry-desc { font-size: 13px; color: var(--text-sec); line-height: 1.65; margin-bottom: 0.6rem; }
.post-entry-cta { font-size: 12px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; }
.post-entry-cta:hover { color: var(--accent-hover); }
.post-entry-cta span { display: inline-block; transition: transform 0.2s; }
.post-entry-cta:hover span { transform: translateX(3px); }
.note-entry { background: #ece6dd; border-radius: 8px; padding: 1rem 1.2rem; margin: 0.6rem 0; position: relative; }
.note-entry-text { font-size: 13px; color: var(--text-mid); line-height: 1.75; padding-right: 1.5rem; }
.note-entry-img { margin-top: 0.6rem; border-radius: 6px; overflow: hidden; }
.note-entry-img img { width: 100%; display: block; border-radius: 6px; }
.note-entry-date { font-size: 10px; color: var(--text-muted); margin-top: 0.6rem; }
.note-entry-icon { position: absolute; bottom: 1rem; right: 1.2rem; font-size: 16px; color: #c4b5a2; }
.footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; max-width: 680px; margin: 0 auto; }
.footer-text { font-size: 11px; color: var(--text-muted); }
.footer-cta { font-size: 12px; color: var(--accent); text-decoration: none; }
@media (max-width: 640px) {
  .nav { padding: 0 1.2rem; } .nav-links { gap: 1rem; } .nav-links a { font-size: 11px; }
  .page-header { padding: 2.5rem 1.2rem 0.5rem; } .blog-feed { padding: 1.5rem 1.2rem 3rem; }
  .footer { padding: 1.5rem 1.2rem; }
}
</style>
</head>
<body>
<nav class="nav" id="nav">
  <a href="index.html" class="nav-name">Kene Ezeoke</a>
  <ul class="nav-links">
    <li><a href="index.html">Work</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="about.html#contact">Contact</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="page-title">Blog</div>
  <div class="page-desc">Notes on building systems, decision quality, and operating in ambiguity.</div>
</div>
<div class="blog-feed" id="blogFeed"></div>
<div class="footer">
  <div class="footer-text">kene.work &middot; &copy; 2026</div>
  <a href="about.html#contact" class="footer-cta">Get in touch &rarr;</a>
</div>
<script src="blog-data.js"></script>
<script>
var nav = document.getElementById('nav');
window.addEventListener('scroll', function() { nav.classList.toggle('scrolled', window.scrollY > 10); });
var feedEl = document.getElementById('blogFeed');
var html = '';
blogData.forEach(function(item) {
  if (item.type === 'note') {
    html += '<div class="note-entry">';
    html += '<div class="note-entry-text">' + item.text + '</div>';
    if (item.image) html += '<div class="note-entry-img"><img src="' + item.image + '" alt=""></div>';
    html += '<div class="note-entry-date">' + item.date + '</div>';
    html += '<i class="ti ti-bolt note-entry-icon" aria-hidden="true"></i>';
    html += '</div>';
  } else {
    html += '<div class="post-entry">';
    html += '<div class="post-entry-date">' + item.date + '</div>';
    html += '<div class="post-entry-title"><a href="' + item.url + '">' + item.title + '</a></div>';
    html += '<div class="post-entry-desc">' + item.desc + '</div>';
    html += '<a href="' + item.url + '" class="post-entry-cta">Read post <span>&rarr;</span></a>';
    html += '</div>';
  }
});
feedEl.innerHTML = html;
</script>
</body>
</html>
